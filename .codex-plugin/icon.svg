<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <!-- 脑叶渐变 -->
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:1" />
    </linearGradient>
    <!-- 节点发光 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 圆形背景 -->
  <circle cx="128" cy="128" r="120" fill="url(#bgGrad)"/>

  <!-- 小脑/大脑轮廓 - 简化的抽象形状 -->
  <g transform="translate(128, 120)">
    <!-- 左脑叶 -->
    <path d="M -55 -30 
             C -70 -50, -60 -75, -35 -80
             C -25 -82, -15 -78, -10 -70
             C -5 -80, 5 -82, 12 -75
             L 12 -30
             C 5 -25, -5 -25, -12 -28
             C -25 -25, -40 -20, -55 -30 Z" 
          fill="url(#brainGrad)" 
          opacity="0.95"/>
    
    <!-- 右脑叶 -->
    <path d="M 55 -30 
             C 70 -50, 60 -75, 35 -80
             C 25 -82, 15 -78, 10 -70
             C 5 -80, -5 -82, -12 -75
             L -12 -30
             C -5 -25, 5 -25, 12 -28
             C 25 -25, 40 -20, 55 -30 Z" 
          fill="url(#brainGrad)" 
          opacity="0.95"/>
    
    <!-- 小脑下部 -->
    <path d="M -45 10
             C -50 25, -35 40, -15 45
             C 0 48, 15 45, 25 38
             C 40 28, 48 15, 45 5
             L 40 0
             C 35 -5, 20 -8, 0 -10
             C -20 -8, -35 -5, -45 10 Z" 
          fill="url(#brainGrad)" 
          opacity="0.9"/>
    
    <!-- 脑沟纹理 - 左侧 -->
    <path d="M -48 -45 Q -40 -55, -30 -50" stroke="#c7d2fe" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M -35 -60 Q -28 -65, -20 -60" stroke="#c7d2fe" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    
    <!-- 脑沟纹理 - 右侧 -->
    <path d="M 48 -45 Q 40 -55, 30 -50" stroke="#c7d2fe" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 35 -60 Q 28 -65, 20 -60" stroke="#c7d2fe" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    
    <!-- 脑沟纹理 - 下部 -->
    <path d="M -30 20 Q -15 30, 0 28" stroke="#c7d2fe" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 10 30 Q 25 25, 35 18" stroke="#c7d2fe" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- 任务节点/连接点 - 代表项目管理 -->
  <g filter="url(#glow)">
    <!-- 中心节点 -->
    <circle cx="128" cy="145" r="8" fill="#fbbf24"/>
    
    <!-- 周围任务节点 -->
    <circle cx="90" cy="120" r="5" fill="#34d399"/>
    <circle cx="166" cy="120" r="5" fill="#34d399"/>
    <circle cx="80" cy="165" r="5" fill="#60a5fa"/>
    <circle cx="176" cy="165" r="5" fill="#60a5fa"/>
    <circle cx="128" cy="185" r="5" fill="#f472b6"/>
  </g>

  <!-- 连接线 - 代表任务依赖图 -->
  <g stroke="rgba(255,255,255,0.6)" stroke-width="2" fill="none" stroke-linecap="round">
    <line x1="128" y1="145" x2="90" y2="120"/>
    <line x1="128" y1="145" x2="166" y2="120"/>
    <line x1="128" y1="145" x2="80" y2="165"/>
    <line x1="128" y1="145" x2="176" y2="165"/>
    <line x1="128" y1="145" x2="128" y2="185"/>
  </g>

  <!-- 进化箭头 - 右下角小标识 -->
  <g transform="translate(195, 195)">
    <circle r="22" fill="rgba(255,255,255,0.15)"/>
    <path d="M -10 5 L 0 -8 L 10 5" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M -10 2 L 0 -11 L 10 2" stroke="#fbbf24" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  </g>
</svg>
